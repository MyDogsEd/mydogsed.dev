<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }}</title>
    <meta name="description" content="{{ meta_description }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{{ root_path }}portfolio.css">
    <link rel="stylesheet" href="{{ root_path }}blog/blog.css">
    <link rel="stylesheet" href="{{ root_path }}blog/code-theme.css">
</head>
<body>
    <header class="site-header">
        <nav class="navbar navbar-expand-lg navbar-dark">
            <div class="container-fluid px-0">
                <a href="{{ home_href }}" class="navbar-brand icon-link text-light">
                    <i class="bi bi-terminal"></i>
                    mydogsed.dev
                </a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarToggle"
                    aria-controls="navbarToggle" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div id="navbarToggle" class="collapse navbar-collapse justify-content-lg-end">
                    <ul class="navbar-nav">
                        <li class="nav-item"><a href="{{ home_href }}" class="nav-link"><span class="accent">/</span> home</a></li>
                        <li class="nav-item"><a href="{{ home_href }}#projects" class="nav-link"><span class="accent">/</span> projects</a></li>
                        <li class="nav-item"><a href="{{ home_href }}#contact" class="nav-link"><span class="accent">/</span> contact</a></li>
                        <li class="nav-item"><a href="{{ blog_index_href }}" class="nav-link"><span class="accent">/</span> blog</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="blog-main">
        {{ page_content }}
    </main>

    <footer class="site-footer">
        <div>
            <p class="footer-brand"><i class="bi bi-terminal"></i> mydogsed.dev</p>
            <p class="footer-copy">Computer science student focused on software engineering and networking infrastructure.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>
</html>
